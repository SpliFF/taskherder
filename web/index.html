<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>taskherd console</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230a0c0a'/%3E%3Cpath d='M3 4h10v2H9v6H7V6H3z' fill='%2352d273'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/vendor/xterm.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="masthead">
    <h1><span class="logo-mark">▚</span> TASKHERD <span class="logo-sub">console</span></h1>
    <div class="conn" id="conn" title="connection">●</div>
  </header>
  <main id="app" aria-live="polite">
    <p class="boot">connecting…</p>
  </main>
  <section class="term-panel" id="term-panel" hidden>
    <div class="panel-resize" title="drag to resize"></div>
    <div class="term-bar">
      <span class="term-title" id="term-title">—</span>
      <span class="term-actions">
        <button class="btn warn" id="term-int" title="Send SIGINT (Ctrl-C) to the terminal">INT</button>
        <button class="btn danger" id="term-term" title="Send SIGTERM to the terminal">TERM</button>
        <button class="btn" id="term-close" title="Close the terminal panel">CLOSE</button>
      </span>
    </div>
    <div class="term-host" id="term-host"></div>
  </section>
  <section class="diff-panel" id="diff-panel" hidden>
    <div class="panel-resize" title="drag to resize"></div>
    <div class="term-bar">
      <span class="term-title" id="diff-title">—</span>
      <span class="term-actions">
        <button class="btn" id="diff-close" title="Close the diff panel">CLOSE</button>
      </span>
    </div>
    <div class="diff-body" id="diff-body"></div>
  </section>
  <section class="gfx-panel" id="gfx-panel" hidden>
    <div class="panel-resize" title="drag to resize"></div>
    <div class="term-bar">
      <span class="term-title" id="gfx-title">—</span>
      <span class="term-actions">
        <button class="btn" id="gfx-close" title="Close the GUI stream">CLOSE</button>
      </span>
    </div>
    <iframe class="gfx-frame" id="gfx-frame" title="runner GUI stream"
            allow="clipboard-read; clipboard-write; fullscreen"></iframe>
  </section>
  <div class="toasts" id="toasts"></div>
  <script type="module" src="/app.mjs"></script>
</body>
</html>
